<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alessandro Rizzo simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0d0d0f;
  --bg2:    #18181c;
  --bg3:    #242428;
  --gold:   #f5c842;
  --amber:  #e8922a;
  --cream:  #f0e8d8;
  --dim:    #888070;
  --red:    #ff4040;
  --green:  #22c55e;
  --blue:   #60a5fa;
  --purple: #a78bfa;
  --border: rgba(245,200,66,0.18);
  --r:      10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  display: flex; flex-direction: column;
  height: 100dvh; /* dynamic viewport height */
  max-width: 480px; margin: 0 auto;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 6px;
  flex-shrink: 0;
}
.app-title { font-size: 13px; font-weight: 800; color: var(--gold); letter-spacing: 0.02em; }

/* ── STATUS ── */
.status-wrap { padding: 0 14px 6px; flex-shrink: 0; }
.status-bar {
  font-size: 13px; font-weight: 600; color: var(--dim);
  text-align: center; min-height: 20px;
  transition: color 0.3s;
}
.status-bar.on       { color: var(--amber); }
.status-bar.sec-intro  { color: var(--amber); }
.status-bar.sec-strofa { color: var(--green); }
.status-bar.sec-rit    { color: var(--purple); }
.status-bar.end { color: var(--red); animation: blink .6s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── PROGRESS STRIP ── */
.progress-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 6px; padding: 0 14px 6px; flex-shrink: 0;
}
.progress-block {
  background: var(--bg2); border: 1.5px solid var(--bg3);
  border-radius: 8px; padding: 6px 8px;
  transition: border-color .3s, background .3s;
}
.progress-block.active-intro  { border-color: var(--amber); background: #1e1508; }
.progress-block.active-strofa { border-color: var(--green);  background: #0a1a0a; }
.progress-block.active-rit    { border-color: var(--purple); background: #120a1e; }
.progress-lbl {
  font-size: 9px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--dim); margin-bottom: 2px;
}
.progress-block.active-intro  .progress-lbl { color: var(--amber); }
.progress-block.active-strofa .progress-lbl { color: var(--green); }
.progress-block.active-rit    .progress-lbl { color: var(--purple); }
.progress-val {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 900; color: var(--bg3); line-height: 1;
}
.progress-block.active-intro  .progress-val { color: var(--amber); }
.progress-block.active-strofa .progress-val { color: var(--green); }
.progress-block.active-rit    .progress-val { color: var(--purple); }
.progress-remain { font-size: 9px; color: var(--dim); margin-top: 1px; }
.progress-block.active-strofa .progress-remain { color: #4ade80; }
.progress-block.active-rit    .progress-remain { color: #c4b5fd; }
.progress-block.active-intro  .progress-remain { color: #fbbf24; }

/* ── COUNTIN ── */
.countin-inline {
  display: flex; justify-content: center; gap: 18px;
  padding: 4px 14px; flex-shrink: 0;
}
.countin-beat {
  font-family: 'Playfair Display', serif;
  font-size: 36px; font-weight: 900;
  color: var(--bg3); line-height: 1; width: 36px; text-align: center;
  transition: color .06s, transform .06s;
}
.countin-beat.active {
  color: var(--sec, var(--gold));
  text-shadow: 0 0 20px var(--sec-glow, rgba(245,200,66,.6));
  transform: scale(1.15);
}
.countin-beat.count-in-active {
  color: #fff; text-shadow: 0 0 28px rgba(255,255,255,.7);
  transform: scale(1.25);
}

/* ── CHORD CARDS ── */
.chord-display {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 6px; padding: 0 14px; flex-shrink: 0;
}
.chord-card {
  background: var(--bg2); border: 2px solid var(--bg3);
  border-radius: 10px; padding: 10px 4px 8px;
  text-align: center; position: relative; overflow: hidden;
  transition: border-color .15s, background .15s, box-shadow .15s;
}
.chord-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--sec, var(--gold));
  transform: scaleX(0); transform-origin: left;
}
.chord-card.active {
  border-color: var(--sec, var(--gold));
  background: var(--sec-card, #1e1a08);
  box-shadow: 0 0 16px var(--sec-glow, rgba(245,200,66,.2));
}
.chord-card.active::after { transform: scaleX(1); transition: transform .1s; }
.chord-num { font-size: 9px; font-weight: 700; letter-spacing: .15em; color: var(--dim); margin-bottom: 3px; text-transform: uppercase; }
.chord-card.active .chord-num { color: var(--sec, var(--amber)); }
.chord-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: #c0a870; line-height: 1; }
.chord-card.active .chord-name { color: var(--sec, var(--gold)); }
.chord-fn { font-size: 8px; color: var(--dim); margin-top: 3px; letter-spacing: .06em; }

/* Section colors */
body.sec-intro  { --sec: #f5c842; --sec-glow: rgba(245,200,66,.45); --sec-card: #1e1a08; }
body.sec-strofa { --sec: #22c55e; --sec-glow: rgba(34,197,94,.4);   --sec-card: #0a1a0a; }
body.sec-rit    { --sec: #a78bfa; --sec-glow: rgba(167,139,250,.4); --sec-card: #120a1e; }

/* ── INSTRUMENT ROW ── */
.instrument-row {
  display: grid; grid-template-columns: 1fr auto;
  gap: 6px; margin: 6px 14px 0; flex-shrink: 0;
}
.instrument-current {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg2); border: 1.5px solid var(--bg3);
  border-radius: 10px; padding: 6px 10px;
  transition: border-color .15s;
}
.instrument-random {
  background: var(--bg2); border: 1.5px solid var(--bg3);
  border-radius: 10px; padding: 6px 12px;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  font-size: 16px; transition: all .15s; min-width: 60px;
}
.instrument-random:active { background: var(--bg3); }
.instrument-random-lbl { font-size: 8px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--dim); }
.instrument-icon { font-size: 16px; }
.instrument-name { font-size: 13px; font-weight: 700; color: var(--gold); }
.instrument-hint { font-size: 10px; color: var(--amber); margin-top: 0; }
.btn-loc {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: var(--bg3); border: 1.5px solid var(--border);
  color: var(--amber); width: 32px; height: 32px; border-radius: 8px;
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.btn-loc:active { background: var(--bg); }

/* ── LOCATION ── */
.location-card {
  margin: 6px 14px 0;
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 8px 44px 8px 12px;
  position: relative; flex-shrink: 0;
}
.location-label { font-size: 9px; font-weight: 700; letter-spacing: .14em; color: var(--amber); text-transform: uppercase; margin-bottom: 3px; }
.location-text { font-size: 14px; font-weight: 600; color: var(--cream); line-height: 1.35; }
.location-text.flash { animation: flash .35s ease; }
@keyframes flash { 0%,100%{opacity:1} 40%{opacity:.1} }
.sound-badge { display: none; }

/* ── MAIN ACTION BUTTONS ── */
.main-actions {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; padding: 8px 14px 0; flex-shrink: 0;
}
.btn-play-big {
  background: var(--green); color: #fff;
  border: none; border-radius: 12px;
  font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 800;
  letter-spacing: .04em; padding: 16px;
  cursor: pointer; transition: all .15s;
  box-shadow: 0 2px 0 #166534;
}
.btn-play-big:active { transform: translateY(2px); box-shadow: none; }
.btn-play-big.on { background: #166534; box-shadow: none; color: #86efac; }
.btn-play-big:disabled { opacity: .4; cursor: default; }
.btn-stop-big {
  background: transparent; color: #ff8070; border: 2px solid #7f1d1d;
  border-radius: 12px; font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 800; padding: 16px;
  cursor: pointer; transition: all .15s; letter-spacing: .04em;
}
.btn-stop-big:active { background: #1f0808; }

/* ── FINALE BUTTON ── */
.btn-finale {
  margin: 8px 14px 0;
  background: linear-gradient(135deg, #3a0c06, #7a1c10);
  border: 2px solid #9a2010; color: #ffcdc8;
  border-radius: 12px; font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 800; letter-spacing: .04em;
  padding: 14px; cursor: pointer; width: calc(100% - 28px);
  transition: all .15s; display: block; flex-shrink: 0;
}
.btn-finale:active { transform: scale(.98); }
.btn-finale:disabled { opacity: .3; cursor: default; }
.btn-finale.armed { animation: pulserr .8s ease infinite; border-color: var(--red); color: #ff9090; }
@keyframes pulserr { 0%,100%{box-shadow:0 0 0 rgba(255,64,64,0)} 50%{box-shadow:0 0 18px rgba(255,64,64,.6)} }

.version-badge { font-size: 11px; font-weight: 700; color: var(--dim); letter-spacing: .05em; }

/* ── METRO BUTTON ── */
.metro-btn {
  background: var(--bg2); border: 1.5px solid var(--bg3);
  color: var(--dim); font-size: 11px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 0 12px; height: 40px; border-radius: 10px;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.metro-btn.on { border-color: var(--amber); color: var(--amber); background: rgba(232,146,42,.12); }
.metro-btn:active { transform: scale(.95); }

/* ── RANDOM BUTTON ── */
.btn-random {
  margin: 6px 14px 0;
  background: linear-gradient(135deg, #2a1a00, #4a2e00);
  border: 2px solid var(--gold); color: var(--gold);
  border-radius: 12px; font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
  padding: 12px; cursor: pointer; width: calc(100% - 28px);
  transition: all .15s; display: block; flex-shrink: 0;
  box-shadow: 0 2px 0 #1a0c00;
}
.btn-random:active { transform: translateY(2px); box-shadow: none; }
.btn-random.flash { animation: rglow .5s ease; }
@keyframes rglow { 0%{border-color:#fff8a0;color:#fff8a0;box-shadow:0 0 30px rgba(255,248,160,.4)} 100%{} }

/* ── TEMPO STRIP ── */
.tempo-strip {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; padding: 8px 14px; flex-shrink: 0;
}
.tempo-lbl { font-size: 10px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; color: var(--dim); min-width: 28px; }
.tempo-adj {
  background: var(--bg2); border: 1.5px solid var(--bg3);
  color: var(--cream); font-size: 20px; font-weight: 700;
  width: 40px; height: 40px; border-radius: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .12s; line-height: 1;
}
.tempo-adj:active { background: var(--bg3); transform: scale(.95); }
.tempo-num { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--gold); min-width: 64px; text-align: center; }

/* Curtains */
.curt { position: fixed; top: 0; height: 100%; width: 50%; z-index: 200; background: #1a0800; transition: transform 1.2s cubic-bezier(.77,0,.23,1); }
.curt-l { left: 0; }
.curt-r { right: 0; }
.curt-l.open { transform: translateX(-100%); }
.curt-r.open { transform: translateX(100%); }
</style>
</head>
<body>
<div class="curt curt-l" id="curtL"></div>
<div class="curt curt-r" id="curtR"></div>

<!-- HEADER -->
<div class="header">
  <div class="app-title">🎹🎸 Alessandro Rizzo Simulator 🎵🪗</div>
  <div class="version-badge">v 0.3</div>
</div>

<!-- PROGRESS -->
<div class="progress-row" id="progressRow">
  <div class="progress-block" id="pbIntro">
    <div class="progress-lbl">Intro</div>
    <div class="progress-val" id="pvIntro">—</div>
    <div class="progress-remain" id="prIntro"></div>
  </div>
  <div class="progress-block" id="pbStrofa">
    <div class="progress-lbl">Strofa</div>
    <div class="progress-val" id="pvStrofa">—</div>
    <div class="progress-remain" id="prStrofa"></div>
  </div>
  <div class="progress-block" id="pbRit">
    <div class="progress-lbl">Ritornello</div>
    <div class="progress-val" id="pvRit">—</div>
    <div class="progress-remain" id="prRit"></div>
  </div>
</div>

<!-- STATUS -->
<div class="status-wrap">
  <div class="status-bar" id="statusBar">premi Play per iniziare</div>
</div>

<!-- COUNT 1 2 3 4 -->
<div class="countin-inline" id="countinInline">
  <div class="countin-beat" id="cb1">1</div>
  <div class="countin-beat" id="cb2">2</div>
  <div class="countin-beat" id="cb3">3</div>
  <div class="countin-beat" id="cb4">4</div>
</div>

<!-- CHORD CARDS -->
<div class="chord-display" id="chordDisplay">
  <div class="chord-card" id="cc0"><div class="chord-num" id="cnum0">I</div><div class="chord-name" id="cname0">—</div><div class="chord-fn" id="cfn0"></div></div>
  <div class="chord-card" id="cc1"><div class="chord-num" id="cnum1">II</div><div class="chord-name" id="cname1">—</div><div class="chord-fn" id="cfn1"></div></div>
  <div class="chord-card" id="cc2"><div class="chord-num" id="cnum2">III</div><div class="chord-name" id="cname2">—</div><div class="chord-fn" id="cfn2"></div></div>
  <div class="chord-card" id="cc3"><div class="chord-num" id="cnum3">IV</div><div class="chord-name" id="cname3">—</div><div class="chord-fn" id="cfn3"></div></div>
</div>

<!-- INSTRUMENT -->
<div class="instrument-row">
  <div class="instrument-current" id="instrStrip">
    <div class="instrument-icon" id="instrIcon">🎹</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <div class="instrument-name" id="instrName">Grand Piano</div>
      <div class="instrument-hint" id="instrBass">🎸 —</div>
    </div>
  </div>
  <button class="instrument-random" onclick="randomInstrument()">🎲<div class="instrument-random-lbl">cambia</div></button>
</div>

<!-- LOCATION -->
<div class="location-card">
  <div class="location-label">📍 Scena</div>
  <div class="location-text" id="locText">—</div>
  <button class="btn-loc" onclick="newLocation()" title="Nuova scena">↺</button>
</div>

<!-- PLAY / STOP -->
<div class="main-actions">
  <button class="btn-play-big" id="btnPlay" onclick="togglePlay()">▶ Play</button>
  <button class="btn-stop-big" onclick="stopAll()">■ Stop</button>
</div>

<!-- FINALE -->
<button class="btn-finale" id="btnEnding" onclick="armEnding()" disabled>🎬 Segnala finale ad Alessandro</button>

<!-- RANDOM -->
<button class="btn-random" id="btnRandom" onclick="doFullRandom()">🎲 RANDOMIZZA TUTTO — nuova progressione, stile e scena</button>

<!-- TEMPO -->
<div class="tempo-strip">
  <span class="tempo-lbl">BPM</span>
  <button class="tempo-adj" onclick="setTempo(Math.max(60,bpm-5));document.getElementById('tempoSlider').value=bpm">−</button>
  <span class="tempo-num" id="tempoVal">120</span>
  <button class="tempo-adj" onclick="setTempo(Math.min(200,bpm+5));document.getElementById('tempoSlider').value=bpm">+</button>
  <button class="metro-btn" id="metroBtn" onclick="toggleMetronome()">metronomo OFF</button>
  <input type="range" id="tempoSlider" min="70" max="160" value="120" oninput="setTempo(+this.value)" style="display:none">
</div>


<script>
const NOTES=['Do','Do#','Re','Re#','Mi','Fa','Fa#','Sol','Sol#','La','La#','Si'];
const CHORD_INT={maj:[0,4,7],min:[0,3,7],dom7:[0,4,7,10],maj7:[0,4,7,11],min7:[0,3,7,10],sus4:[0,5,7],sus2:[0,2,7],maj6:[0,4,7,9],dim7:[0,3,6,9],aug:[0,4,8],min6:[0,3,7,9]};
function cLabel(r,t){const s={maj:'',min:'m',dom7:'7',maj7:'maj7',min7:'m7',sus4:'sus4',sus2:'sus2',maj6:'6',dim7:'°7',aug:'+',min6:'m6'};return NOTES[r%12]+(s[t]??'');}
function bNotes(r,t){return CHORD_INT[t].map(i=>r+i);}

const SOUND_NAMES={grandpiano:'Grand Piano',jazzpiano:'Jazz Piano',elecpiano:'Rhodes',organ:'Hammond Organ',pipeorgan:'Pipe Organ',accordion:'Fisarmonica',strings:'Archi',brass:'Ottoni',nylonguitar:'Chitarra Classica',distguitar:'Chitarra Elettrica',steelguitar:'Steel Guitar',honkytonk:'Honky-Tonk Piano',synthpad:'Synth Pad',vibraphone:'Vibrafono',harpsichord:'Clavicembalo',marimba:'Marimba'};

const THEMES=[
  // ── POP/BROADWAY classici ─────────────────────────────
  {name:"I - IV - V - I",emoji:"🎹",tempo:120,perc:"swing",sound:"grandpiano",ch:[{r:60,t:'maj'},{r:65,t:'maj'},{r:67,t:'maj'},{r:60,t:'maj'}],fn:['I','IV','V','I'],lg:'teatro'},
  {name:"I - vi - IV - V",emoji:"🌟",tempo:118,perc:"rock",sound:"grandpiano",ch:[{r:60,t:'maj'},{r:69,t:'min'},{r:65,t:'maj'},{r:67,t:'maj'}],fn:['I','vi','IV','V'],lg:'teatro'},
  {name:"I - V - vi - IV",emoji:"✨",tempo:116,perc:"swing",sound:"grandpiano",ch:[{r:60,t:'maj'},{r:67,t:'maj'},{r:69,t:'min'},{r:65,t:'maj'}],fn:['I','V','vi','IV'],lg:'magico'},
  {name:"I - IV - I - V7",emoji:"⛪",tempo:110,perc:"gospel",sound:"organ",ch:[{r:60,t:'maj'},{r:65,t:'maj'},{r:60,t:'maj'},{r:67,t:'dom7'}],fn:['I','IV','I','V7'],lg:'sacro'},
  {name:"I - ii - V - I",emoji:"🎷",tempo:124,perc:"swing",sound:"jazzpiano",ch:[{r:60,t:'maj'},{r:62,t:'min'},{r:67,t:'dom7'},{r:60,t:'maj'}],fn:['I','ii','V7','I'],lg:'locale'},

  // ── JAZZ ii-V-I e variazioni ──────────────────────────
  {name:"ii7 - V7 - Imaj7 - IVmaj7",emoji:"🎷",tempo:140,perc:"swing",sound:"jazzpiano",ch:[{r:62,t:'min7'},{r:67,t:'dom7'},{r:60,t:'maj7'},{r:65,t:'maj7'}],fn:['ii7','V7','Imaj7','IVmaj7'],lg:'locale'},
  {name:"i7 - IV7 - I7 - V7",emoji:"🎺",tempo:148,perc:"swing",sound:"brass",ch:[{r:65,t:'dom7'},{r:70,t:'dom7'},{r:65,t:'dom7'},{r:67,t:'dom7'}],fn:['IV7','bVII7','IV7','V7'],lg:'locale'},
  {name:"Imaj7 - vi7 - ii7 - V7",emoji:"🔔",tempo:112,perc:"swing",sound:"vibraphone",ch:[{r:60,t:'maj7'},{r:69,t:'min7'},{r:62,t:'min7'},{r:67,t:'dom7'}],fn:['Imaj7','vi7','ii7','V7'],lg:'locale'},
  {name:"III7 - VI7 - II7 - V7",emoji:"🎩",tempo:152,perc:"swing",sound:"jazzpiano",ch:[{r:64,t:'dom7'},{r:69,t:'dom7'},{r:62,t:'dom7'},{r:67,t:'dom7'}],fn:['III7','VI7','II7','V7'],lg:'storico'},
  {name:"i - iv7 - V7 - bIII",emoji:"🥐",tempo:104,perc:"bossa",sound:"accordion",ch:[{r:69,t:'min'},{r:62,t:'min7'},{r:67,t:'dom7'},{r:60,t:'maj7'}],fn:['i','iv7','V7','bIII'],lg:'storico'},
  {name:"Imaj7 - ii7 - V7 - Imaj7",emoji:"🎵",tempo:108,perc:"bossa",sound:"jazzpiano",ch:[{r:60,t:'maj7'},{r:62,t:'min7'},{r:67,t:'dom7'},{r:60,t:'maj7'}],fn:['Imaj7','ii7','V7','Imaj7'],lg:'locale'},

  // ── BLUES e derivati ──────────────────────────────────

      [['sawtooth',0],['sawtooth',8],['square',-8]].forEach(([tp,d])=>{const o=ctx.createOscillator();o.type=tp;o.frequency.value=f;o.detune.value=d;o.connect(filt);o.start(t0);o.stop(t0+dur+0.55);});
      g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+0.32); g.gain.setValueAtTime(vol,t0+dur-0.22); g.gain.linearRampToValueAtTime(0,t0+dur+0.5);
      filt.connect(g); g.connect(dryGain); g.connect(revNode); lfo.start(t0); lfo.stop(t0+dur+0.55); break;
    }
    case 'vibraphone':{
      const g=ctx.createGain();
      [[1,1],[2.756,0.5],[5.4,0.22],[8.9,0.08]].forEach(([r,a])=>{const o=ctx.createOscillator();o.type='sine';o.frequency.value=f*r;const og=ctx.createGain();og.gain.value=a*vol*0.52;o.connect(og);og.connect(g);o.start(t0);o.stop(t0+dur+0.7);});
      g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(1,t0+0.003); g.gain.exponentialRampToValueAtTime(0.28,t0+0.5); g.gain.exponentialRampToValueAtTime(0.001,t0+Math.min(dur+0.6,3.8));
      g.connect(dryGain); g.connect(revNode); break;
    }
    case 'harpsichord':{
      const g=ctx.createGain(), filt=ctx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=1900; filt.Q.value=1.6;
      [[1,'square'],[2,'sawtooth'],[3,'square']].forEach(([r,tp],i)=>{const o=ctx.createOscillator();o.type=tp;o.frequency.value=f*r;const og=ctx.createGain();og.gain.value=1/(i+1);o.connect(og);og.connect(filt);o.start(t0);o.stop(t0+0.9);});
      g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+0.002); g.gain.exponentialRampToValueAtTime(vol*0.12,t0+0.14); g.gain.exponentialRampToValueAtTime(0.001,t0+0.8);
      filt.connect(g); g.connect(dryGain); g.connect(revNode); break;
    }
    case 'marimba':{
      const g=ctx.createGain();
      [[1,1],[3,0.48],[6,0.14]].forEach(([r,a])=>{const o=ctx.createOscillator();o.type='sine';o.frequency.value=f*r;const og=ctx.createGain();og.gain.value=a*vol*0.52;o.connect(og);og.connect(g);o.start(t0);o.stop(t0+1.6);});
      g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(1,t0+0.004); g.gain.exponentialRampToValueAtTime(0.18,t0+0.28); g.gain.exponentialRampToValueAtTime(0.001,t0+Math.min(dur,1.5));
      g.connect(dryGain); g.connect(revNode); break;
    }
    default: playNote(midi,t0,dur,vol,'grandpiano');
  }
}

// RHYTHM PATTERNS — semplici, sempre sull'1
const RHYTHM_PATTERNS = [
  [0],                    // intero tenuto
  [0],                    // intero tenuto (peso doppio)
  [0, 2],                 // due metà
  [0, 2],                 // due metà (peso doppio)
  [0, 1, 2, 3],           // quarti
  [0, 2, 3],              // 1 poi 3 4
  [0, 1, 3],              // 1 2 4
  [0, 1.5, 3],            // sincopato leggero
  [0, 2, 2.5],            // 1 poi ottavo su 3
];

let chordRhythms=[0,0,0,0]; // pattern index per ciascun accordo
function assignRhythms(){
  for(let i=0;i<4;i++) chordRhythms[i]=Math.floor(Math.random()*RHYTHM_PATTERNS.length);
}

function playChordAt(notes, t0, dur, sound, volScale=1.0, withBass=false){
  if(withBass) playNote(notes[0]-12, t0, dur, 0.46*volScale, sound);
  notes.forEach((n,i)=>playNote(n, t0, dur, (i===0?0.24:0.19)*volScale, sound));
}

// PERCUSSION
function kick(t){const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(155,t);o.frequency.exponentialRampToValueAtTime(30,t+0.15);g.gain.setValueAtTime(0.65,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.33);o.connect(g);g.connect(dryGain);o.start(t);o.stop(t+0.4);}
function snare(t,vol=0.4){const sz=Math.floor(ctx.sampleRate*0.19),buf=ctx.createBuffer(1,sz,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource();s.buffer=buf;const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2600;bp.Q.value=0.65;const g=ctx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.17);const o=ctx.createOscillator();o.type='triangle';o.frequency.value=165;const og=ctx.createGain();og.gain.setValueAtTime(vol*0.3,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.07);s.connect(bp);bp.connect(g);g.connect(dryGain);o.connect(og);og.connect(dryGain);s.start(t);s.stop(t+0.22);o.start(t);o.stop(t+0.1);}
function hihat(t,vol=0.12,open=false){const dur=open?0.38:0.07,sz=Math.floor(ctx.sampleRate*dur),buf=ctx.createBuffer(1,sz,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource();s.buffer=buf;const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=7500;const g=ctx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);s.connect(hp);hp.connect(g);g.connect(dryGain);s.start(t);s.stop(t+dur+0.02);}
function rim(t){const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=1500;g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.033);o.connect(g);g.connect(dryGain);o.start(t);o.stop(t+0.04);}
function metroClick(t, isOne){
  // Accento sull'1: tono più basso e più forte — 2/3/4: tono più alto e più leggero
  const freq  = isOne ? 880  : 1320;
  const vol   = isOne ? 1.8  : 1.2;
  const decay = isOne ? 0.055 : 0.035;

  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + decay);
  osc.connect(g);
  g.connect(masterGain);
  osc.start(t);
  osc.stop(t + decay + 0.005);
}

function clickSound(t,vol=0.65){const sz=Math.floor(ctx.sampleRate*0.008),buf=ctx.createBuffer(1,sz,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/sz,1.5);const s=ctx.createBufferSource();s.buffer=buf;const g=ctx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.008);s.connect(g);g.connect(masterGain);s.start(t);s.stop(t+0.01);}

function perc(beat,t,type){
  const spb=60/bpm;
  switch(type){
    case 'swing': hihat(t,0.09); if(beat===0||beat===2)kick(t); if(beat===1||beat===3)snare(t,0.32); break;
    case 'rock':  hihat(t,0.11); if(beat===0||beat===2)kick(t); if(beat===1||beat===3)snare(t,0.38); break;
    case 'funk':  hihat(t,0.07); if(beat===0)kick(t); if(beat===1)snare(t,0.28); if(beat===2){kick(t);kick(t+spb*0.5);} if(beat===3){snare(t,0.32);hihat(t+spb*0.5,0.06);} break;
    case 'bossa': if(beat===0||beat===2)kick(t); rim(t); if(beat===1||beat===3)hihat(t,0.14,true); break;
    case 'march': if(beat===0){kick(t);snare(t,0.45);} if(beat===1)hihat(t,0.07); if(beat===2)kick(t); if(beat===3){snare(t,0.28);hihat(t,0.07);} break;
    case 'latin': hihat(t,0.06); if(beat===0)kick(t); if(beat===1)rim(t); if(beat===2){kick(t);rim(t+spb*0.33);} if(beat===3)snare(t,0.22); break;
    case 'gospel':hihat(t,0.08); if(beat===0)kick(t); if(beat===1)snare(t,0.48); if(beat===2){kick(t);kick(t+spb*0.5);} if(beat===3)snare(t,0.42); break;
    case 'tango': if(beat===0){kick(t);snare(t,0.38);} if(beat===2)kick(t); if(beat===1||beat===3)rim(t); break;
  }
}

// COUNT-IN
function doCountIn(onDone){
  isCountingIn=true;
  const spb=60/bpm, startT=ctx.currentTime+0.12;
  // Schedule click sounds
  for(let i=0;i<4;i++) clickSound(startT+i*spb, i===0?0.95:0.6);
  // Schedule each number to light up in sync with audio
  for(let i=1;i<=4;i++){
    const beat=i;
    schedUI(()=>{
      for(let j=1;j<=4;j++) document.getElementById('cb'+j).classList.remove('active','count-in-active');
      document.getElementById('cb'+beat).classList.add('count-in-active');
    }, startT+(i-1)*spb);
  }
  // Clear and start music after 4 beats
  schedUI(()=>{
    for(let j=1;j<=4;j++) document.getElementById('cb'+j).classList.remove('active','count-in-active');
    isCountingIn=false;
    onDone(startT+4*spb);
  }, startT+4*spb);
}

// SCHEDULER
function scheduler(){
  while(nextBeatTime<ctx.currentTime+LOOK_AHEAD){scheduleBeat(totalBeats,nextBeatTime);nextBeatTime+=60/bpm;totalBeats++;}
  schedTimer=setTimeout(scheduler,TICK_MS);
}

// BASS SOUNDS
let bassPatterns=[0,0,0,0];
let bassEngine=0;

const BASS_PATTERNS = [
  [[0,-12]],
  [[0,-12],[2,-12]],
  [[0,-12],[2,-12],[3,-5]],
  [[0,-12],[1,-5],[2,-12],[3,-5]],
  [[0,-12],[0.5,-12],[2,-12],[3,-12]],
  [[0,-12],[2,-5],[3,-7]],
  [[0,-12],[1,-7],[2,-12],[3,-7]],
  [[0,-12],[2.5,-12]],
];

const BASS_ENGINES = [
  // 0: Electric Jazz Bass — sawtooth + filter envelope
  function bassElectric(freq, hitT, dur){
    const osc=ctx.createOscillator(), g=ctx.createGain(), filt=ctx.createBiquadFilter();
    osc.type='sawtooth'; osc.frequency.value=freq;
    filt.type='lowpass'; filt.Q.value=3.5;
    filt.frequency.setValueAtTime(800,hitT); filt.frequency.exponentialRampToValueAtTime(140,hitT+0.18);
    g.gain.setValueAtTime(0,hitT); g.gain.linearRampToValueAtTime(0.68,hitT+0.012);
    g.gain.exponentialRampToValueAtTime(0.25,hitT+0.2); g.gain.exponentialRampToValueAtTime(0.001,hitT+dur);
    osc.connect(filt); filt.connect(g); g.connect(dryGain);
    osc.start(hitT); osc.stop(hitT+dur+0.05);
  },
  // 2: Fretless/Upright — triangle with portamento warmth + slight vibrato
  function bassFretless(freq, hitT, dur){
    const osc=ctx.createOscillator(), lfo=ctx.createOscillator(), lfog=ctx.createGain(), g=ctx.createGain(), filt=ctx.createBiquadFilter();
    osc.type='triangle'; osc.frequency.setValueAtTime(freq*0.97,hitT); osc.frequency.linearRampToValueAtTime(freq,hitT+0.04);
    lfo.type='sine'; lfo.frequency.value=5.5; lfog.gain.value=freq*0.012;
    lfo.connect(lfog); lfog.connect(osc.frequency);
    filt.type='lowpass'; filt.frequency.value=600; filt.Q.value=1.2;
    g.gain.setValueAtTime(0,hitT); g.gain.linearRampToValueAtTime(0.66,hitT+0.02);
    g.gain.exponentialRampToValueAtTime(0.22,hitT+0.3); g.gain.exponentialRampToValueAtTime(0.001,hitT+dur);
    osc.connect(filt); filt.connect(g); g.connect(dryGain); g.connect(revNode);
    osc.start(hitT); osc.stop(hitT+dur+0.1); lfo.start(hitT); lfo.stop(hitT+dur+0.1);
  },
  // 3: Slap Bass — percussive click + short body
  function bassSlap(freq, hitT, dur){
    // click transient
    const click=ctx.createOscillator(), cg=ctx.createGain();
    click.type='square'; click.frequency.setValueAtTime(freq*3,hitT); click.frequency.exponentialRampToValueAtTime(freq,hitT+0.025);
    cg.gain.setValueAtTime(0.5,hitT); cg.gain.exponentialRampToValueAtTime(0.001,hitT+0.04);
    click.connect(cg); cg.connect(dryGain); click.start(hitT); click.stop(hitT+0.05);
    // body
    const osc=ctx.createOscillator(), g=ctx.createGain(), filt=ctx.createBiquadFilter();
    osc.type='sawtooth'; osc.frequency.value=freq; filt.type='lowpass'; filt.frequency.value=400; filt.Q.value=2;
    g.gain.setValueAtTime(0,hitT+0.01); g.gain.linearRampToValueAtTime(0.60,hitT+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,hitT+Math.min(dur,0.35));
    osc.connect(filt); filt.connect(g); g.connect(dryGain);
    osc.start(hitT+0.01); osc.stop(hitT+0.45);
  },
  // 5: Motown Walking Bass — slightly overdriven triangle, mid-forward
  function bassMotown(freq, hitT, dur){
    const osc=ctx.createOscillator(), dist=ctx.createWaveShaper(), g=ctx.createGain(), filt=ctx.createBiquadFilter();
    osc.type='triangle'; osc.frequency.value=freq;
    const cv=new Float32Array(128); for(let i=0;i<128;i++){const x=i*2/128-1;cv[i]=Math.tanh(x*2.5)*0.7;} dist.curve=cv;
    filt.type='bandpass'; filt.frequency.value=250; filt.Q.value=0.9;
    g.gain.setValueAtTime(0,hitT); g.gain.linearRampToValueAtTime(0.64,hitT+0.015);
    g.gain.exponentialRampToValueAtTime(0.2,hitT+0.22); g.gain.exponentialRampToValueAtTime(0.001,hitT+dur);
    osc.connect(dist); dist.connect(filt); filt.connect(g); g.connect(dryGain);
    osc.start(hitT); osc.stop(hitT+dur+0.05);
  },
];

const BASS_NAMES=['Electric Jazz','Fretless/Upright','Slap Bass','Motown Walking'];

function refreshBassDisplay(){
  const el=document.getElementById('instrBass');
  if(el) el.textContent='🎸 '+(BASS_NAMES[bassEngine]||'—');
}
function assignBassPatterns(){
  for(let i=0;i<4;i++) bassPatterns[i]=Math.floor(Math.random()*BASS_PATTERNS.length);
  bassEngine = Math.floor(Math.random()*BASS_ENGINES.length);
  refreshBassDisplay();
}

function playBass(rootMidi, t0, spb, patternIdx){
  const pattern = BASS_PATTERNS[patternIdx % BASS_PATTERNS.length];
  const engine  = BASS_ENGINES[bassEngine];
  pattern.forEach(([offset, semitones])=>{
    const note = rootMidi + semitones;
    const freq = 440*Math.pow(2,(note-69)/12);
    const hitT = t0 + offset*spb;
    const dur  = spb * 0.55;
    engine(freq, hitT, dur);
  });
}

function scheduleBeat(beat,t){
  const theme=THEMES[themeIdx], spb=60/bpm, bpc=4;
  const cIdx=Math.floor(beat/bpc)%4, bInC=beat%bpc;

  perc(bInC,t,theme.perc);
  if(metronomeOn) metroClick(t, bInC===0);

  // On downbeat of each chord bar: schedule chord + bass for this bar
  if(bInC===0){
    const cd=theme.ch[cIdx];
    // Bass line — always plays (independent of endingDone until the final stab)
    if(!endingDone){
      playBass(cd.r+12, t, spb, bassPatterns[cIdx]);
    }
    // Chords
    if(!endingDone){
      const notes=bNotes(cd.r+12,cd.t);
      const pattern=RHYTHM_PATTERNS[chordRhythms[cIdx]];
      pattern.forEach((offset,hi)=>{
        const hitT=t+offset*spb;
        const nextOff=hi+1<pattern.length?pattern[hi+1]:4;
        const dur=(nextOff-offset)*spb*0.86;
        const isDown=offset===0;
        playChordAt(notes, hitT, dur, theme.sound, isDown?1.0:0.78, false); // bass=false, handled separately
      });
    }
    schedUI(()=>highlightChord(cIdx),t);
  }

  schedUI(()=>highlightBeat(bInC),t);

  if(beat===0)  schedUI(()=>{ introGiro=1; setStruttura('intro'); }, t);
  if(beat===16) schedUI(()=>{ introGiro=2; updateProgressDisplay(); setStatus('🎵 Intro — giro 2 di 2','sec-intro'); }, t);
  if(beat===32) schedUI(()=>{ sezCounter.strofa=1; setStruttura('strofa'); }, t);

  // Increment section counter every full giro (16 beats)
  if(beat>32 && beat%16===0){
    schedUI(()=>{
      if(sezione==='strofa'){
        if(sezCounter.strofa < targets.strofa){
          sezCounter.strofa++; updateStrutturaStatus(); updateProgressDisplay();
          // switch only after completing the last giro
          if(sezCounter.strofa > targets.strofa) toggleSezioneMusicale();
        } else {
          toggleSezioneMusicale();
        }
      } else if(sezione==='rit'){
        if(sezCounter.rit < targets.rit){
          sezCounter.rit++; updateStrutturaStatus(); updateProgressDisplay();
          if(sezCounter.rit > targets.rit) toggleSezioneMusicale();
        } else {
          toggleSezioneMusicale();
        }
      }
    }, t);
  }

  if(endingArmed&&!endingDone&&cIdx===3&&bInC===3){
    endingArmed=false; schedEnding(t+spb);
  }
}

function schedEnding(startT){
  endingDone=true;
  clearTimeout(schedTimer); schedTimer=null;
  const theme=THEMES[themeIdx], spb=60/bpm;
  const cd=theme.ch[0], notes=bNotes(cd.r+12, cd.t);

  // Fade out morbido di tutto ciò che sta suonando
  masterGain.gain.cancelScheduledValues(startT - 0.04);
  masterGain.gain.setValueAtTime(masterGain.gain.value, startT - 0.04);
  masterGain.gain.linearRampToValueAtTime(0, startT - 0.001);

  // Ripristina il gain normale esattamente sul beat — stab identico al normale 1
  masterGain.gain.setValueAtTime(0.8, startT);

  // Suona esattamente come fa il battere dell'1 in scheduleBeat: accordo + basso, durata piena
  playChordAt(notes, startT, spb * 0.9, theme.sound, 1.0, true);
  kick(startT);

  schedUI(()=>{ highlightChord(0); highlightBeat(0); }, startT);

  // Lascia suonare e decadere naturalmente, poi ferma
  schedUI(()=>{
    stopAll(true);
    setStatus('✨ fine — sipario!','');
  }, startT + spb * 1);
}

let targets={strofa:4, rit:4};

function adjTarget(type, delta){
  targets[type]=Math.max(1,Math.min(16,targets[type]+delta));
  document.getElementById(type==='strofa'?'tStrofa':'tRit').textContent=targets[type];
  updateProgressDisplay();
}

function updateProgressDisplay(){
  // intro block
  const introActive = sezione==='intro';
  document.getElementById('pbIntro').className='progress-block'+(introActive?' active-intro':'');
  document.getElementById('pvIntro').textContent = introActive ? (introGiro+' / 2') : (sezione==='none'?'—':'✓');
  document.getElementById('prIntro').textContent = introActive ? (introGiro<2?'manca ancora':'ultimo giro') : '';

  // strofa block
  const sCur=sezCounter.strofa, sTarget=targets.strofa;
  const sRemain=Math.max(0,sTarget-sCur);
  document.getElementById('pvStrofa').textContent =
    sezione==='none'||sezione==='intro' ? '—' : `${sCur} / ${sTarget}`;
  document.getElementById('prStrofa').textContent =
    sezione!=='none'&&sezione!=='intro' ? (sRemain>0?`mancano ${sRemain}`:'✓ completate') : '';
  document.getElementById('pbStrofa').className='progress-block'+(sezione==='strofa'?' active-strofa':'');

  // rit block
  const rCur=sezCounter.rit, rTarget=targets.rit;
  const rRemain=Math.max(0,rTarget-rCur);
  document.getElementById('pvRit').textContent =
    sezione==='none'||sezione==='intro' ? '—' : `${rCur} / ${rTarget}`;
  document.getElementById('prRit').textContent =
    sezione!=='none'&&sezione!=='intro' ? (rRemain>0?`mancano ${rRemain}`:'✓ completati') : '';
  document.getElementById('pbRit').className='progress-block'+(sezione==='rit'?' active-rit':'');
}

function setStruttura(s){
  sezione=s;
  document.body.classList.remove('sec-intro','sec-strofa','sec-rit');
  if(s!=='none') document.body.classList.add('sec-'+s);
  updateStrutturaStatus();
  updateProgressDisplay();
  const btn=document.getElementById('strutturaBtn');
  if(btn){ btn.disabled=(s==='intro'||s==='none'); if(s==='strofa')btn.textContent='→ ritornello'; else if(s==='rit')btn.textContent='→ strofa'; else btn.textContent='strofa ⇄ ritornello'; }
}

function updateStrutturaStatus(){
  const sCur=sezCounter.strofa, sTarget=targets.strofa;
  const rCur=sezCounter.rit,   rTarget=targets.rit;
  if(sezione==='intro')       setStatus('🎵 intro — 2 giri vuoti','sec-intro');
  else if(sezione==='strofa') setStatus(`🎤 Strofa ${sCur} di ${sTarget}  ·  rit: ${rCur}/${rTarget}`,'sec-strofa');
  else if(sezione==='rit')    setStatus(`✨ Ritornello ${rCur} di ${rTarget}  ·  strofe: ${sCur}/${sTarget}`,'sec-rit');
}

function resetStruttura(){
  sezione='none'; sezCounter={strofa:0,rit:0}; strofaTotali=0; introGiro=0;
  document.body.classList.remove('sec-intro','sec-strofa','sec-rit');
  document.getElementById('pbIntro').className='progress-block';
  document.getElementById('pvIntro').textContent='—';
  document.getElementById('prIntro').textContent='';
  document.getElementById('pbStrofa').className='progress-block';
  document.getElementById('pbRit').className='progress-block';
  document.getElementById('pvStrofa').textContent='—';
  document.getElementById('pvRit').textContent='—';
  document.getElementById('prStrofa').textContent='';
  document.getElementById('prRit').textContent='';
  const btn=document.getElementById('strutturaBtn');
  if(btn){ btn.disabled=true; btn.textContent='strofa ⇄ ritornello'; }
}

function toggleSezioneMusicale(){
  if(sezione==='strofa'){
    sezCounter.rit=1; setStruttura('rit');
  } else if(sezione==='rit'){
    sezCounter.strofa=1; setStruttura('strofa');
  }
}

const SOUND_LIST=Object.keys(SOUND_NAMES);
const PIANO_SOUNDS=['grandpiano','grandpiano','grandpiano','jazzpiano','elecpiano','honkytonk'];
function randomWeightedSound(){
  if(Math.random()<0.85) return PIANO_SOUNDS[Math.floor(Math.random()*PIANO_SOUNDS.length)];
  return SOUND_LIST[Math.floor(Math.random()*SOUND_LIST.length)];
}
function cycleInstrument(){
  const cur=THEMES[themeIdx].sound;
  const idx=SOUND_LIST.indexOf(cur);
  const next=SOUND_LIST[(idx+1)%SOUND_LIST.length];
  THEMES[themeIdx].sound=next;
  refreshChordDisplay();
}
function randomInstrument(){
  const cur=THEMES[themeIdx].sound;
  let next=cur;
  while(next===cur) next=randomWeightedSound();
  THEMES[themeIdx].sound=next;
  // Randomizza anche il basso
  bassEngine=Math.floor(Math.random()*BASS_ENGINES.length);
  refreshBassDisplay();
  refreshChordDisplay();
}

function toggleControls(){
  const btn=document.getElementById('ctrlToggle');
  const body=document.getElementById('ctrlBody');
  const open=body.classList.toggle('open');
  btn.classList.toggle('open',open);
}

let metronomeOn = false;
function toggleMetronome(){
  metronomeOn = !metronomeOn;
  const btn = document.getElementById('metroBtn');
  btn.classList.toggle('on', metronomeOn);
  btn.textContent = metronomeOn ? 'metronomo ON' : 'metronomo OFF';
}
function setTempo(v){bpm=v;document.getElementById('tempoVal').textContent=v;}
function setStatus(txt,cls){const s=document.getElementById('statusBar');s.textContent=txt;s.className='status-bar'+(cls?' '+cls:'');}

function togglePlay(){
  if(isCountingIn) return;
  if(isPlaying){
    // PAUSA: sospendi audio context, ferma scheduler
    clearTimeout(schedTimer); schedTimer=null;
    ctx.suspend();
    isPlaying=false;
    document.getElementById('btnPlay').textContent='▶ Play';
    document.getElementById('btnPlay').classList.remove('on');
    setStatus('⏸ in pausa','');
  } else {
    if(ctx && ctx.state==='suspended'){
      // RESUME: riprendi da dove eravamo
      ctx.resume();
      isPlaying=true;
      document.getElementById('btnPlay').textContent='⏸ Pausa';
      document.getElementById('btnPlay').classList.add('on');
      // ripristina scheduler
      nextBeatTime=ctx.currentTime+0.05;
      schedTimer=setTimeout(scheduler,TICK_MS);
      setStatus('▶ ripresa','');
    } else {
      startPlay();
    }
  }
}
function startPlay(){
  initAudio(); if(ctx.state==='suspended')ctx.resume();
  document.getElementById('btnPlay').disabled=true;
  setStatus('1 ... 2 ... 3 ... 4 ...','');
  resetStruttura();
  assignRhythms();
  assignBassPatterns();
  doCountIn((musicStartT)=>{
    isPlaying=true; endingArmed=false; endingDone=false;
    totalBeats=0; nextBeatTime=musicStartT;
    document.getElementById('btnPlay').textContent='⏸ Pausa';
    document.getElementById('btnPlay').classList.add('on');
    document.getElementById('btnPlay').disabled=false;
    document.getElementById('btnEnding').disabled=false;
    setStatus('♪ in scena — suona!','on');
    scheduler();
  });
}
function stopAll(silent=false){
  clearTimeout(schedTimer); schedTimer=null;
  isPlaying=false; isCountingIn=false; endingArmed=false; endingDone=false;
  hideEndingOverlay(); resetStruttura();
  for(let i=1;i<=4;i++) document.getElementById('cb'+i).classList.remove('active','count-in-active');
  document.getElementById('btnPlay').textContent='▶ Play';
  document.getElementById('btnPlay').classList.remove('on');
  document.getElementById('btnPlay').disabled=false;
  document.getElementById('btnEnding').classList.remove('armed');
  document.getElementById('btnEnding').disabled=true;
  for(let i=0;i<4;i++)document.getElementById('cc'+i).classList.remove('active');
  if(!silent)setStatus('premi Play per iniziare','');
}
function armEnding(){if(!isPlaying||endingDone)return;endingArmed=true;document.getElementById('btnEnding').classList.add('armed');setStatus('🎬 Alessandro sa che stai finendo — completa il giro…','end');}

window.addEventListener('DOMContentLoaded',()=>{
  setTimeout(()=>{document.getElementById('curtL').classList.add('open');document.getElementById('curtR').classList.add('open');},150);
  const i=Math.floor(Math.random()*THEMES.length);
  themeIdx=i;
  THEMES[i].sound='grandpiano'; // sempre Grand Piano al primo avvio
  bpm=Math.round(Math.max(85,Math.min(115, 100+(Math.random()-0.5)*30)));
  document.getElementById('tempoSlider').value=bpm;
  document.getElementById('tempoVal').textContent=bpm;
  refreshChordDisplay(); buildThemeGrid(); newLocationForTheme(i); refreshBassDisplay();
});
</script>
